name: lint-erb-lint
description: Lint ERB templates using erb_lint with baseline config. Requires setup-ruby action.
runs:
  using: composite
  steps:
    - run: ruby --version > /dev/null 2>&1 || { echo "Ruby not found. Add setup-ruby action before lint-erb-lint." >&2; exit 1; }
      shell: bash
    - run: bundle install --gemfile "${{ github.action_path }}/Gemfile" --quiet
      shell: bash
    - run: "${{ github.action_path }}/../../../hooks/erb-lint.sh --lint-all"
      shell: bash
      env:
        BUNDLE_GEMFILE: "${{ github.action_path }}/Gemfile"
