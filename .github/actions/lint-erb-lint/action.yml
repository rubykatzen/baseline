name: lint-erb-lint
description: Lint ERB templates using erb_lint with baseline config.
runs:
  using: composite
  steps:
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: "3.3"
    - run: gem install --no-document erb_lint rubocop standard standard-custom standard-performance standard-rails
      shell: bash
    - run: "${{ github.action_path }}/../../../hooks/erb-lint.sh --lint-all"
      shell: bash
      env:
        BASELINE_RUBY_LINTER_STANDALONE: "1"
