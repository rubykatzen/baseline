name: lint-erb-lint
description: Lint ERB templates using erb_lint with the rubykatzen-baseline gem. Requires setup-ruby action and project stubs.
runs:
  using: composite
  steps:
    - run: ruby --version > /dev/null 2>&1 || { echo "Ruby not found. Add setup-ruby action before lint-erb-lint." >&2; exit 1; }
      shell: bash
    - run: "${{ github.action_path }}/../../../hooks/erb-lint.sh"
      shell: bash
