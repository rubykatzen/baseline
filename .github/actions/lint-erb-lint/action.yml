name: lint-erb-lint
description: Lint ERB templates using installed Ruby gems and rubykatzen-baseline project stubs.
runs:
  using: composite
  steps:
    - run: ruby --version > /dev/null 2>&1 || { echo "Ruby not found. Install Ruby before lint-erb-lint." >&2; exit 1; }
      shell: bash
    - run: "${{ github.action_path }}/../../../hooks/erb-lint.sh"
      shell: bash
