name: setup-ruby
description: Install Ruby runtime. Reads version from .ruby-version, .tool-versions, or mise.toml if present, otherwise uses ruby-version input. Required before any Ruby linter actions.
inputs:
  ruby-version:
    description: Ruby version to install (fallback if .ruby-version and .tool-versions are absent)
    required: false
    default: "4.0"
runs:
  using: composite
  steps:
    - id: detect-version
      run: |
        if [ -f .ruby-version ]; then
          echo "version=$(cat .ruby-version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
        elif [ -f .tool-versions ] && grep -q '^ruby ' .tool-versions; then
          echo "version=$(grep '^ruby ' .tool-versions | awk '{print $2}')" >> "$GITHUB_OUTPUT"
        elif [ -f mise.toml ] && grep -q '^ruby\s*=' mise.toml; then
          echo "version=$(grep '^ruby\s*=' mise.toml | sed 's/.*=\s*"\(.*\)".*/\1/')" >> "$GITHUB_OUTPUT"
        else
          echo "version=${{ inputs.ruby-version }}" >> "$GITHUB_OUTPUT"
        fi
      shell: bash
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ steps.detect-version.outputs.version }}
