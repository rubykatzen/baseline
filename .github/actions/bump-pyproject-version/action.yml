name: Bump pyproject.toml version
description: Bump version field in pyproject.toml, commit and push.
inputs:
  version:
    description: Release version without v prefix.
    required: true
runs:
  using: composite
  steps:
    - name: Bump and commit
      shell: bash
      run: |
        set -euo pipefail
        if ! grep -q '^version = ' pyproject.toml 2>/dev/null; then
          exit 0
        fi
        sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" pyproject.toml
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add pyproject.toml
        git commit -m "chore: bump version to ${{ inputs.version }}"
        git push
