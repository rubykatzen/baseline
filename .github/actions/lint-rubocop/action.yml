name: lint-rubocop
description: Lint Ruby files using rubocop with baseline standard config. Requires setup-ruby action.
runs:
  using: composite
  steps:
    - run: ruby --version > /dev/null 2>&1 || { echo "Ruby not found. Add setup-ruby action before lint-rubocop." >&2; exit 1; }
      shell: bash
    - run: bundle install --gemfile "${{ github.action_path }}/Gemfile" --quiet
      shell: bash
    - run: "${{ github.action_path }}/../../../hooks/rubocop.sh"
      shell: bash
      env:
        BUNDLE_GEMFILE: "${{ github.action_path }}/Gemfile"
