name: Prepare release branch
on:
  workflow_dispatch:
    inputs:
      version:
        description: New version without v prefix (e.g. 0.1.0)
        required: true
        type: string
      base_sha:
        description: Expected HEAD SHA of main
        required: true
        type: string
concurrency:
  group: prepare-release-baseline
jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: rubykatzen/releaser/.github/actions/verify-release@v0.3.4
        with:
          base_sha: ${{ inputs.base_sha }}
      - uses: rubykatzen/releaser/.github/actions/generate-notes@v0.3.4
        id: notes
        with:
          version: ${{ inputs.version }}
      - uses: rubykatzen/releaser/.github/actions/prepare-release-branch@v0.3.4
        with:
          version: ${{ inputs.version }}
      - uses: rubykatzen/releaser/.github/actions/update-changelog@v0.3.4
        with:
          version: ${{ inputs.version }}
          notes: ${{ steps.notes.outputs.notes }}
      - uses: rubykatzen/releaser/.github/actions/bump-ruby-gem-version@v0.3.4
        with:
          version: ${{ inputs.version }}
      - name: Bump pre-commit rev
        shell: bash
        run: |
          set -euo pipefail
          sed -i "s/rev: .*/rev: v${{ inputs.version }}/" .pre-commit-config.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .pre-commit-config.yaml
          git diff --cached --quiet || git commit -m "chore: bump pre-commit rev to v${{ inputs.version }}"
      - uses: rubykatzen/releaser/.github/actions/push-release-branch@v0.3.4
        with:
          version: ${{ inputs.version }}
