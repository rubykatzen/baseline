name: Lint (shared)
on:
  workflow_call:
    inputs:
      linters:
        description: >
          Comma-separated linters to run.
          Supported: yamllint, pymarkdown, ruff, shellcheck, actionlint, rubocop, erb-lint, pre-commit
        type: string
        required: true
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: rubykatzen/baseline/.github/actions/setup-runtimes@v0.7
        with:
          linters: ${{ inputs.linters }}
      - uses: rubykatzen/baseline/.github/actions/check-precommit-sync@v0.7
        if: contains(inputs.linters, 'pre-commit')
        with:
          linters: ${{ inputs.linters }}
      - uses: rubykatzen/baseline/.github/actions/lint-yamllint@v0.7
        if: contains(inputs.linters, 'yamllint')
      - uses: rubykatzen/baseline/.github/actions/lint-pymarkdown@v0.7
        if: contains(inputs.linters, 'pymarkdown')
      - uses: rubykatzen/baseline/.github/actions/lint-ruff@v0.7
        if: contains(inputs.linters, 'ruff')
      - uses: rubykatzen/baseline/.github/actions/lint-shellcheck@v0.7
        if: contains(inputs.linters, 'shellcheck')
      - uses: rubykatzen/baseline/.github/actions/lint-actionlint@v0.7
        if: contains(inputs.linters, 'actionlint')
      - uses: rubykatzen/baseline/.github/actions/lint-rubocop@v0.7
        if: contains(inputs.linters, 'rubocop')
      - uses: rubykatzen/baseline/.github/actions/lint-erb-lint@v0.7
        if: contains(inputs.linters, 'erb-lint')
