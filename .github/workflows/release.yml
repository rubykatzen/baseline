name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: New version without v prefix (e.g. 0.1.0)
        required: true
        type: string
      base_sha:
        description: Expected HEAD SHA of main
        required: true
        type: string
concurrency:
  group: release-baseline
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/verify-release
        with:
          base_sha: ${{ inputs.base_sha }}
      - uses: ./.github/actions/generate-notes
        id: notes
        with:
          version: ${{ inputs.version }}
      - uses: ./.github/actions/commit-changelog
        with:
          version: ${{ inputs.version }}
          notes: ${{ steps.notes.outputs.notes }}
      - uses: ./.github/actions/create-release
        with:
          version: ${{ inputs.version }}
          notes: ${{ steps.notes.outputs.notes }}
