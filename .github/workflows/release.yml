name: Release
on:
  push:
    tags:
      - "v*"
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} --generate-notes --title ${{ github.ref_name }}
          gh release view latest >/dev/null 2>&1 \
            && gh release edit latest --target ${{ github.sha }} --title latest \
            || gh release create latest --target ${{ github.sha }} --title latest --notes ""
