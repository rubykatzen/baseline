name: yamllint
on:
  workflow_call:
jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: dupmachine/workflows
          path: .linters
      - run: pip install yamllint
      - run: yamllint -c .linters/configs/yamllint.yml .
