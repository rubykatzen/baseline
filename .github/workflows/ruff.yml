name: ruff
on:
  workflow_call:
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: dupmachine/workflows
          path: .linters
      - run: pip install ruff
      - run: ruff check --config .linters/configs/ruff.toml .
