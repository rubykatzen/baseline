name: Release (shared)
on:
  workflow_call:
    inputs:
      version:
        description: New version without v prefix (e.g. 0.1.0)
        required: true
        type: string
      base_sha:
        description: Expected HEAD SHA of main
        required: true
        type: string
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify base SHA
        run: |
          current=$(git rev-parse HEAD)
          if [ "$current" != "${{ inputs.base_sha }}" ]; then
            echo "main has moved: expected ${{ inputs.base_sha }}, got $current"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Verify CI
        run: |
          conclusion=$(gh run list \
            --branch main \
            --workflow lint.yml \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion // "unknown"')
          if [ "$conclusion" != "success" ]; then
            echo "CI is not green: $conclusion"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          prev_tag=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | grep -v "^${tag}$" | head -1 || true)
          if [ -n "$prev_tag" ]; then
            commits=$(git log "${prev_tag}..HEAD" --format="- %s" --no-merges | head -50)
          else
            commits=$(git log HEAD --format="- %s" --no-merges | head -50)
          fi
          notes=""
          if [ -n "$commits" ]; then
            payload=$(jq -n --arg commits "$commits" '{
              model: "gpt-4o-mini",
              messages: [{
                role: "user",
                content: ("You are writing a changelog entry for a software release. Below are the git commits in this release. Write a concise 2-4 sentence summary in English describing what changed. Write plain prose — no bullet points, no headers.\n\nCommits:\n" + $commits)
              }],
              max_tokens: 300
            }')
            response=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://models.inference.ai.azure.com/chat/completions" \
              -d "$payload" || true)
            notes=$(echo "$response" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)
          fi
          [ -z "$notes" ] && notes="${commits:-No changes}"
          printf '%s' "$notes" > /tmp/release-notes.md
      - name: Update CHANGELOG
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          date=$(date -u +%Y-%m-%d)
          notes=$(cat /tmp/release-notes.md)
          new_entry="## [${tag}] - ${date}"$'\n\n'"${notes}"
          if [ -f CHANGELOG.md ]; then
            current=$(cat CHANGELOG.md)
            if printf '%s' "$current" | head -1 | grep -q '^# Changelog'; then
              rest=$(printf '%s' "$current" | tail -n +3)
              new_content="# Changelog"$'\n\n'"${new_entry}"$'\n\n'"${rest}"
            else
              new_content="${new_entry}"$'\n\n'"${current}"
            fi
          else
            new_content="# Changelog"$'\n\n'"${new_entry}"
          fi
          printf '%s\n' "$new_content" > CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if grep -q '^version = ' pyproject.toml 2>/dev/null; then
            sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" pyproject.toml
            git add pyproject.toml
          fi
          git commit -m "chore: update changelog for ${tag}"
          git push
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Create tag and release
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          git tag -a "$tag" HEAD -m "Release $tag"
          git push origin "$tag"
          gh release create "$tag" \
            --title "$tag" \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
